# Query to get contact counts grouped by center using Native SQL
query GetContactCountByCenter @auth(level: USER) {
  currentUser: user(key: { uid_expr: "auth.uid" }) @redact {
    role @check(expr: "this == 'ADMIN'", message: "Admin access required")
  }
  counts: _select(
    sql: """
      SELECT center, COUNT(*) as count 
      FROM contact 
      GROUP BY center 
      ORDER BY count DESC
    """
  )
}
