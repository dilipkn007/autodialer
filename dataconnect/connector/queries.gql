# Query to fetch call logs of an event for RSVP charts
query GetEventCallStats($eventId: UUID!) @auth(level: USER) {
  currentUser: user(key: { uid_expr: "auth.uid" }) @redact {
    role @check(expr: "this == 'ADMIN'", message: "Admin access required")
  }
  event(id: $eventId) {
    id
    name
    description
    eventDate
    eventTime
    status
  }
  callLogs(where: { event: { id: { eq: $eventId } } }) {
    id
    callOutcome
    followUpStatus
  }
  assignments(where: { event: { id: { eq: $eventId } } }) {
    id
    status
  }
}

# Query to fetch overall dashboard stats for Folk Guide
query GetDashboardOverviewStats @auth(level: USER) {
  currentUser: user(key: { uid_expr: "auth.uid" }) @redact {
    role @check(expr: "this == 'ADMIN'", message: "Admin access required")
  }
  totalContacts: contacts(limit: 50000) { id }
  activeContacts: contacts(where: { currentStatus: { eq: "Active" } }, limit: 50000) { id }
  totalEnablers: users(where: { role: { eq: ENABLER } }, limit: 10000) { uid }
  totalEvents: events(limit: 10000) { id }
  activeEvents: events(where: { status: { eq: ACTIVE } }, limit: 10000) { id }
  totalCalls: callLogs(limit: 50000) { id }
}

# Query to fetch all call outcomes for the distribution pie chart
query GetCallOutcomeDistribution @auth(level: USER) {
  currentUser: user(key: { uid_expr: "auth.uid" }) @redact {
    role @check(expr: "this == 'ADMIN'", message: "Admin access required")
  }
  callLogs {
    callOutcome
  }
}

# Query to fetch active campaigns and their assignments for the progress tracker
