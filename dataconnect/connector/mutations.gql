# ─────────────────────────────────────────────────────────────────
# FOLK Auto Dialer — Mutations
# ─────────────────────────────────────────────────────────────────

# ─── User Mutations ──────────────────────────────────────────────

# Create or update user profile
mutation UpsertUser(
  $uid: String!
  $phone: String!
  $name: String!
  $email: String
  $avatarInitials: String
) @auth(expr: "auth.uid == vars.uid && auth.token.firebase.sign_in_provider != 'anonymous'") {
  user_upsert(data: {
    uid: $uid
    phone: $phone
    name: $name
    email: $email
    role: ENABLER
    avatarInitials: $avatarInitials
    isActive: true
  })
}

# Update user active status
mutation SetUserActiveStatus(
  $uid: String!
  $isActive: Boolean!
) @auth(level: USER) @transaction {
  query @redact {
    user(key: { uid_expr: "auth.uid" }) {
      role @check(expr: "this == 'ADMIN'", message: "Admin access required")
    }
  }
  user_update(key: { uid: $uid }, data: { isActive: $isActive })
}

